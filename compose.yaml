services:
  postgres:
    image: postgres:17
    container_name: postgres-1
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: odoo
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    build:
      context: .
      dockerfile: minio/Dockerfile
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      PORT: "${MINIO_PORT:-9001}"
    ports:
      - "${MINIO_PORT:-9000}:${MINIO_PORT:-9000}"
      - "${MINIO_PORT:-9001}:${MINIO_PORT:-9001}"
    volumes:
      - minio_data:/data
    command: ["/bin/sh", "/custom-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  odoo:
    build:
      context: .
      dockerfile: odoo/19.0/Dockerfile
    container_name: odoo-1
    environment:
      ODOO_PORT: "8069"
      ODOO_GEVENT_PORT: "8072"
      ODOO_DATABASE_HOST: "postgres"
      ODOO_DATABASE_PORT: "5432"
      ODOO_DATABASE_USER: "odoo"
      ODOO_DATABASE_PASSWORD: "odoo"
      # ODOO_DATABASE_NAME: "False"
      ODOO_DATABASE_FILTER: ".*"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin123"
      S3_BUCKET: "odoo"
    ports:
      - "8069:8069"
      - "8072:8072"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: /bin/sh /entrypoint.sh
    volumes:
      - odoo_data:/var/lib/odoo

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nginx-1
    environment:
      PORT: "80"
      ODOO_HOST: odoo
      ODOO_PORT: "8069"
      ODOO_WS_PORT: "8072"
    ports:
      - "80:80"
    depends_on:
      - odoo
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  pgadmin:
    build:
      context: .
      dockerfile: pgadmin/Dockerfile
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: "5050"
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

networks:
  default_network:
    name: odoo-default
    driver: bridge

volumes:
  pg_data:
  minio_data:
  odoo_data:
  pgadmin_data:
