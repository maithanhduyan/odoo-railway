map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen ${PORT};
    server_name _;

    # Use Docker/Railway internal DNS resolver for runtime resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Runtime-resolved backend addresses (avoids startup DNS failure)
    set $odoo_http  ${ODOO_HOST}:8069;
    set $odoo_ws    ${ODOO_HOST}:8072;

    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Websocket → gevent worker (port 8072)
    location /websocket {
        proxy_pass http://$odoo_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # All other traffic → HTTP workers (port 8069)
    location / {
        proxy_pass    http://$odoo_http;
        proxy_redirect off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/css text/plain text/xml application/xml application/json application/javascript;

    # Static & attachment caching
    location ~* /web/static/ {
        proxy_pass         http://$odoo_http;
        proxy_cache_valid  200 60m;
        expires            24h;
    }

    # Increase max upload size (for import, attachments)
    client_max_body_size 100m;
}
