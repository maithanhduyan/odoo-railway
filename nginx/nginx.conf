map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Proxy cache for static assets
proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=odoo_static:10m max_size=200m inactive=24h;

server {
    listen 80;
    server_name _;

    # DNS resolver (injected by entrypoint from /etc/resolv.conf)
    # Re-resolves on every request when used with variables ($odoo_http/$odoo_ws)
    resolver ${DNS_RESOLVER} valid=10s;

    # Runtime-resolved backend addresses (forces DNS re-lookup per request)
    set $odoo_http  ${ODOO_HOST}:${ODOO_PORT};
    set $odoo_ws    ${ODOO_HOST}:${ODOO_WS_PORT};

    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Keepalive to backend
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Gzip compression
    gzip on;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types text/css text/plain text/xml application/xml application/json application/javascript image/svg+xml;

    # Increase max upload size (for import, attachments)
    client_max_body_size 100m;

    # Block database management endpoints
    location ~* ^/web/database/ {
        return 403;
    }

    # Websocket → gevent worker (port 8072)
    # workers=0: gevent not active → falls back to HTTP port automatically
    # workers>0: served on dedicated gevent port
    location /websocket {
        proxy_pass http://$odoo_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Static & attachment caching — serve from nginx cache
    location ~* /web/static/ {
        proxy_pass         http://$odoo_http;
        proxy_cache        odoo_static;
        proxy_cache_valid  200 24h;
        proxy_cache_valid  404 1m;
        add_header         X-Cache-Status $upstream_cache_status;
        expires            7d;
    }

    # Web image/content caching
    location ~* /web/image/ {
        proxy_pass         http://$odoo_http;
        proxy_cache        odoo_static;
        proxy_cache_valid  200 12h;
        proxy_cache_valid  404 1m;
        add_header         X-Cache-Status $upstream_cache_status;
        expires            1d;
    }

    # All other traffic → Odoo HTTP backend
    location / {
        proxy_pass    http://$odoo_http;
        proxy_redirect off;
    }
}
