map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # DNS resolver (injected by entrypoint from /etc/resolv.conf)
    resolver ${DNS_RESOLVER} valid=30s;

    # Runtime-resolved backend addresses (avoids startup DNS failure)
    set $odoo_http  ${ODOO_HOST}:${ODOO_PORT};
    set $odoo_ws    ${ODOO_HOST}:${ODOO_WS_PORT};

    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Websocket
    # workers=0: served on HTTP port (8069)
    # workers>0: change to $odoo_ws for gevent port (8072)
    location /websocket {
        proxy_pass http://$odoo_http;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # All other traffic → HTTP workers (port 8069)
    location / {
        proxy_pass    http://$odoo_http;
        proxy_redirect off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/css text/plain text/xml application/xml application/json application/javascript;

    # Static & attachment caching
    location ~* /web/static/ {
        proxy_pass         http://$odoo_http;
        proxy_cache_valid  200 60m;
        expires            24h;
    }

    # Increase max upload size (for import, attachments)
    client_max_body_size 100m;
}
