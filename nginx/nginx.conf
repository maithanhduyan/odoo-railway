map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Keepalive connection pool to Odoo backend
upstream odoo_backend {
    server ${ODOO_HOST}:${ODOO_PORT};
    keepalive 16;
}

# Proxy cache for static assets
proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=odoo_static:10m max_size=200m inactive=24h;

server {
    listen 80;
    server_name _;

    # DNS resolver (injected by entrypoint from /etc/resolv.conf)
    resolver ${DNS_RESOLVER} valid=30s;

    # Runtime-resolved backend addresses (for variable-based resolution)
    set $odoo_http  ${ODOO_HOST}:${ODOO_PORT};

    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Keepalive to backend
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Gzip compression
    gzip on;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types text/css text/plain text/xml application/xml application/json application/javascript image/svg+xml;

    # Increase max upload size (for import, attachments)
    client_max_body_size 100m;

    # Websocket
    # workers=0: served on HTTP port (8069)
    # workers>0: change proxy_pass to odoo gevent port (8072)
    location /websocket {
        proxy_pass http://$odoo_http;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Static & attachment caching — serve from nginx cache
    location ~* /web/static/ {
        proxy_pass         http://odoo_backend;
        proxy_cache        odoo_static;
        proxy_cache_valid  200 24h;
        proxy_cache_valid  404 1m;
        add_header         X-Cache-Status $upstream_cache_status;
        expires            7d;
    }

    # Web image/content caching
    location ~* /web/image/ {
        proxy_pass         http://odoo_backend;
        proxy_cache        odoo_static;
        proxy_cache_valid  200 12h;
        proxy_cache_valid  404 1m;
        add_header         X-Cache-Status $upstream_cache_status;
        expires            1d;
    }

    # All other traffic → Odoo backend with keepalive
    location / {
        proxy_pass    http://odoo_backend;
        proxy_redirect off;
    }
}
